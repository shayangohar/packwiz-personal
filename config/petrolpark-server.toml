#.
#Chiseled Bookshelves broadcast their data to clients
syncChiseledBookshelves = true

#.
[extendedInventory]
	#.
	#Only attempt to attach the Extended Inventory to menus known not to cause problems
	safeMode = true

#.
[processing]
	#.
	#Ageing Recipes are possible in Vanilla Barrels (and modded Barrels which extend it)
	ageingInVanillaBarrels = true
	#.
	#Chiseled Bookshelves containing Recipe Books and Knowledge Books can provide the Recipes they contain to adjacent Blocks
	chiseledBookShelfProvidesRecipeBooks = true

#.
[contamination]
	#.
	#Simple shaped Crafting Recipes will propagate the inputs' Contaminants to the outputs, regardless of what they are crafted in
	propagateShapedCrafting = true
	#.
	#Simple shapeless Crafting Recipes will propagate the inputs' Contaminants to the output, regardless of what they are crafted in
	propagateShapelessCrafting = true
	#.
	#Recipes done in Crafting Tables and the Inventory will propagate the inputs' Contaminants to the the output
	#This can include simple shaped and shapeless Crafting Recipes, as well as custom ones like crafting Firework Stars
	propagateCraftingTable = true
	#.
	#Smelting, Blasting, Smoking etc. Recipes will propagate the Contaminants of the input to the output
	propagateCooking = true
	#.
	#Brewing will propagate the Contaminants of inputs to the resultant Potion
	propagateBrewing = true
	#.
	#The Contaminants of a Potion brewed from a Water Bottle depend only on the Contaminants of the added ingredient, not the Water Bottle
	brewingIgnoreWaterBottle = true
	#.
	#Smithing will propagate the Contaminants of the base Item and added Item to the result
	propagateSmithing = true

#.
[compatibility]

	#.
	[compatibility.create]
		#.
		"Crushing Wheels can be encased in Brass Casing, allowing a Recipe filter to be set" = true
		#.
		#[Must be enabled by a dependent]
		#Whether Mechanical Arms can take from and place on Chain Conveyors
		armsTargetChainConveyors = false
		#.
		#Whether Drying Recipes can be done on Chain Conveyors
		chainConveyorDrying = true

		#.
		[compatibility.create.centrifuge]
			#.
			# Default: 2000
			# Range: > 0
			"Capacity of each Centrifuge tank" = 2000
			#.
			"Centrifuges can separate Potions into their Ingredients" = true
			#.
			#Centrifugation Recipes will propagate the Contaminants of the inputs to the outputs
			propagateContaminants = true

		#.
		[compatibility.create.contamination]
			#.
			#How many mB of Fluid should be considered to be equal to one Item when weighting preserved Contaminants in any Recipes involving Fluids
			#Set to 0 to not count the Contaminants of input Fluids. Contaminants will still propagate to output Fluids.
			# Default: 100.0
			# Range: 0.0 ~ 3.4028234663852886E38
			fluidWeight = 100.0
			#.
			#Recipes done in a Basin will propagate the Contaminants of the input to the outputs
			propagateBasin = true
			#.
			#Recipes done by Millstones and Crushing Wheels will propagate the Contaminants of the input to the outputs
			propagateCrushing = true
			#.
			#Manual Sandpaper Polishing Recipes will propagate the Contaminants of the input to the output
			propagateSanding = true
			#.
			#Cutting Recipes will propagate the Contaminants of the input to the output
			propagateCutting = true
			#.
			#Pressing, Deploying, Washing and all Mechanical Fan Recipes propagate the Contaminants of the input to the outputs
			propagateOther = true

		#.
		[compatibility.create.redstoneProgrammer]
			#.
			#Maximum number of channels in a single Redstone Programmer
			# Default: 20
			# Range: 1 ~ 256
			maxChannels = 20
			#.
			#The shortest length (in ticks) a Redstone Programmer can change signal over.
			#The lower this is, the greater the potential for players to cause lag.
			# Default: 2
			# Range: 1 ~ 20
			minTicksPerBeat = 2

#.
[stressValues]

	#.
	#.
	#[in Stress Units]
	#Individual coefficients of stress impact of kinetic blocks.
	[stressValues.impact]
		blender = 2.0
		centrifuge = 2.0
